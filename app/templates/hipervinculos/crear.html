{% extends "base.html" %}
{% block content %}
<style>
    .form-card {
        background: white;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
        border: 1px solid #e8ecf1;
        max-width: 800px;
        margin: 0 auto;
    }

    .form-card h5 {
        color: #0d2b45;
        font-weight: 700;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid #e8ecf1;
    }

    .form-label {
        font-weight: 600;
        color: #3a4a5a;
        font-size: 0.9rem;
    }

    .form-control,
    .form-select {
        border: 2px solid #e0e6ed;
        border-radius: 8px;
        padding: 0.7rem 1rem;
        transition: 0.2s;
    }

    .form-control:focus,
    .form-select:focus {
        border-color: #0d2b45;
        box-shadow: 0 0 0 3px rgba(13, 43, 69, 0.08);
    }

    .btn-guardar {
        background: #dadada;
        color: #000;
        border: none;
        padding: 0.7rem 2rem;
        border-radius: 6px;
        font-weight: 600;
        transition: 0.2s;
    }

    .btn-guardar:hover {
        background: #bfbfbf;
        color: #000;
    }

    .btn-cerrar {
        background: white;
        color: #5a7a9a;
        border: 2px solid #dce6f0;
        padding: 0.7rem 2rem;
        border-radius: 6px;
        font-weight: 600;
        text-decoration: none;
    }

    .btn-cerrar:hover {
        background: #f5f7fa;
    }

    .file-info {
        font-size: 0.8rem;
        color: #6c7a8a;
        margin-top: 0.5rem;
    }
</style>
