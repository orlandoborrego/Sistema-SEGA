{% extends "base.html" %}
{% block content_login %}

<style>
    body {
        background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
        margin: 0;
        padding: 0;
    }
    .register-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }
    .register-card {
        background: white;
        border-radius: 15px;
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        text-align: center;
    }
    .register-card h2 {
        color: #0d2b45;
        font-weight: 800;
        margin-bottom: 0.5rem;
        font-size: 1.8rem;
    }
    .register-card p {
        color: #5a7a9a;
        font-size: 0.9rem;
        margin-bottom: 2rem;
    }
    .form-control {
        background: #f5f7fa;
        border: 2px solid #e0e6ed;
        border-radius: 8px;
        padding: 0.7rem 1rem;
        margin-bottom: 1rem;
        text-align: left;
    }
    .form-control:focus {
        border-color: #0d2b45;
        box-shadow: 0 0 0 3px rgba(13,43,69,0.1);
    }
    .btn-registrar {
        background: #0d2b45;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 0.8rem;
        width: 100%;
        font-weight: 700;
        letter-spacing: 1px;
        margin-top: 0.5rem;
    }
    .btn-registrar:hover {
        background: #061a2e;
    }
    .login-link {
        margin-top: 1.5rem;
        font-size: 0.85rem;
        color: #5a7a9a;
    }
    .login-link a {
        color: #0d2b45;
        font-weight: 600;
        text-decoration: none;
    }
</style>

<div class="register-container">
    <div class="register-card">
        <h2>Crear Cuenta</h2>
        <p>Sistema Estratégico de Gestión de Archivos</p>

        <form method="POST">
            <input type="text" name="username" class="form-control" placeholder="Nombre de usuario" required>
            <input type="email" name="email" class="form-control" placeholder="Correo electrónico" required>
            <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
            <button type="submit" class="btn-registrar">Registrarse</button>
        </form>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Iniciar sesión</a>
        </div>
    </div>
</div>
{% endblock %}
