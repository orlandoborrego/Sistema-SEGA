{% extends "base.html" %}
{% block content_login %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: white;
        overflow: hidden;
    }

    .login-wrapper {
        display: flex;
        height: 100vh;
        width: 100vw;
    }


    .login-left {
        width: 40%;
        min-width: 420px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem;
    }

    .login-card {
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    .login-logo {
        width: 100px;
        height: auto;
        margin-bottom: 1rem;
    }

    .login-title {
        font-size: 2.8rem;
        font-weight: 800;
        color: #0d2b45;
        margin-bottom: 0.2rem;
        letter-spacing: 4px;
    }

    .login-subtitle {
        font-size: 0.85rem;
        color: #5a7a9a;
        margin-bottom: 2.5rem;
        font-weight: 500;
        line-height: 1.4;
    }

    .login-input {
        background: #f5f7fa;
        border: 2px solid #e0e6ed;
        border-radius: 8px;
        padding: 14px 18px;
        font-size: 1rem;
        text-align: left;
        font-weight: 500;
        color: #1a3a5c;
        width: 100%;
        margin-bottom: 1.2rem;
        transition: 0.3s;
    }

    .login-input:focus {
        border-color: #0d2b45;
        box-shadow: 0 0 0 3px rgba(13, 43, 69, 0.1);
        outline: none;
        background: white;
    }

    .login-input::placeholder {
        color: #a0b0c0;
    }

    .login-btn {
        background-color: #dadada;
        color: #000;
        border: none;
        border-radius: 8px;
        padding: 14px;
        font-size: 1.1rem;
        font-weight: 700;
        width: 100%;
        cursor: pointer;
        transition: 0.3s;
        letter-spacing: 3px;
        margin-top: 0.3rem;
    }

    .login-btn:hover {
        background: #878787;
        color: white;
    }

    .login-footer {
        margin-top: 2.5rem;
        font-size: 0.75rem;
        color: #7a8fa0;
        line-height: 1.6;
    }

    .login-footer strong {
        color: #0d2b45;
    }

    .login-right {
        width: 60%;
        position: relative;
        overflow: hidden;

        background: linear-gradient(rgba(0, 0, 0, .25),
            rgba(0, 0, 0, .25)),
        url("{{ url_for('static', filename='img/IMAGEN.png') }}");

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    #particles-js {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }

    .login-right-content {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        padding: 3rem;
        transform: translateY(-40px);
    }

    .login-right::before {
        content: '';
        position: absolute;
        width: 550px;
        height: 550px;
        border-radius: 50%;
        background: rgba(255, 255, 255, .04);
        top: -220px;
        right: -220px;
    }

    .login-right::after {
        content: '';
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: rgba(255, 255, 255, .03);
        bottom: -150px;
        left: -150px;
    }

    .login-right-content {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        padding: 3rem;
    }

    .right-logo {
        width: 55%;
        max-width: 420px;
        min-width: 220px;
        filter: drop-shadow(0 15px 30px rgba(0, 0, 0, .25));
        transition: all .3s ease;
    }

    .right-logo:hover {
        transform: scale(1.02);
    }

    .right-subtitle {
        margin-top: 45px;
        color: #2f2f2f;
        font-size: 1.5rem;
        font-weight: 500;
        letter-spacing: 5px;
        line-height: 1.4;
        text-transform: uppercase;
        text-align: center;
    }

    @media (max-width: 768px) {
        .login-right {
            display: none;
        }

        .login-left {
            width: 100%;
            min-width: 100%;
        }
    }
</style>

<div class="login-wrapper">

    <div class="login-left">
        <div class="login-card">

            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="login-logo"
                onerror="this.style.display='none'">

            <h1 class="login-title">SEGA</h1>
            <p class="login-subtitle">Sistema Estratégico de Gestión de Archivos</p>
            <p style="text-align:center; margin-top:1rem;">

            </p>
            <form method="POST">
                <input type="text" name="username" class="login-input" placeholder="Ingrese su usuario" required>

                <input type="password" name="password" class="login-input" placeholder="Ingrese su contraseña" required>

                <button type="submit" class="login-btn">Acceder</button>
            </form>

            <div class="login-footer">
                <p>© 2026 <strong>FISCALIA GENERAL DEL ESTADO DE TAMAULIPAS</strong></p>
                <p>Dirección General de Tecnología, Información y Telecomunicaciones</p>
            </div>
        </div>
    </div>

    <div class="login-right">
        <div id="particles-js"></div>
        <div class="login-right-content">

            <img src="{{ url_for('static', filename='img/logo_fgjtam_white.png') }}" alt="FGJTAM" class="right-logo">

            <p class="right-subtitle">
                SISTEMA ESTRATÉGICO DE<br>
                GESTIÓN DE ARCHIVOS
            </p>

        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
    tsParticles.load("particles-js", {
        particles: {
            number: {
                value: 80
            },
            color: {
                value: "#ffffff"
            },
            opacity: {
                value: 0.25
            },
            size: {
                value: {
                    min: 1,
                    max: 4
                }
            },
            move: {
                enable: true,
                speed: 0.8
            },
            links: {
                enable: true,
                color: "#ffffff",
                opacity: 0.12,
                distance: 150
            }
        },
        background: {
            color: "transparent"
        }
    });
</script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var nav = document.querySelector('.navbar');
        if (nav) nav.remove();
    });
</script>
{% endblock %}
